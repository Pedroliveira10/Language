<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Language Learning Studio</title>
<style>
:root {
  --bg:#f4f6fb;
  --card:rgba(255,255,255,.86);
  --text:#172033;
  --muted:#667085;
  --border:#e5e7eb;
  --shadow:0 24px 70px rgba(23,32,51,.14);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}
html{height:100%;-webkit-text-size-adjust:100%}
body{min-height:100dvh;overflow-x:hidden}
button{touch-action:manipulation}
body{
  min-height:100vh;color:var(--text);
  background:
    radial-gradient(circle at 12% 8%,rgba(220,38,38,.13),transparent 27rem),
    radial-gradient(circle at 88% 12%,rgba(15,118,110,.16),transparent 27rem),
    radial-gradient(circle at 50% 100%,rgba(212,160,23,.12),transparent 24rem),
    var(--bg);
}
button{font:inherit}
#chooser{
  min-height:100dvh;display:grid;place-items:center;
  padding:max(18px,env(safe-area-inset-top)) 18px max(22px,env(safe-area-inset-bottom));
}
.shell{width:min(1050px,100%)}
.hero{
  text-align:center;margin-bottom:28px;
}
.kicker{
  display:inline-flex;padding:7px 12px;border-radius:999px;
  background:rgba(255,255,255,.76);border:1px solid var(--border);
  color:var(--muted);font-size:12px;font-weight:800;letter-spacing:.05em;
  box-shadow:0 8px 24px rgba(23,32,51,.06);
}
h1{font-size:clamp(34px,6vw,64px);margin:16px 0 10px;letter-spacing:-.045em;line-height:1.02}
.hero p{max-width:680px;margin:0 auto;color:var(--muted);font-size:18px;line-height:1.6}
.languages{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}
.language-card{
  position:relative;overflow:hidden;border:1px solid var(--border);
  border-radius:26px;padding:28px;text-align:left;cursor:pointer;color:var(--text);
  background:var(--card);backdrop-filter:blur(18px);box-shadow:var(--shadow);
  transition:.25s;min-height:280px;
}
.language-card:hover{transform:translateY(-7px);box-shadow:0 30px 80px rgba(23,32,51,.19)}
.language-card:after{
  content:"";position:absolute;width:210px;height:210px;border-radius:50%;
  right:-70px;top:-70px;opacity:.13;
}
.language-card.polish:after{background:linear-gradient(135deg,#dc2626,#fb7185)}
.language-card.portuguese:after{background:linear-gradient(135deg,#0f766e,#d4a017)}
.language-card.dutch:after{background:linear-gradient(135deg,#f97316,#2563eb)}
.flag{font-size:52px;display:block;margin-bottom:18px}
.language-card h2{font-size:30px;margin:0 0 7px;letter-spacing:-.025em}
.language-card p{color:var(--muted);line-height:1.55;margin:0 0 24px;max-width:430px}
.features{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 10px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.7);font-size:12px;color:var(--muted)}
.open-line{position:absolute;bottom:24px;right:26px;font-weight:850}
#player{display:none;position:fixed;inset:0;background:#fff;height:100dvh;overflow:hidden}
#appFrame{width:100%;height:100dvh;border:0;display:block;background:#fff}
.switcher{
  position:fixed;z-index:99999;
  top:max(10px,env(safe-area-inset-top));right:max(10px,env(safe-area-inset-right));
  border:1px solid rgba(255,255,255,.22);background:rgba(17,24,39,.86);color:#fff;
  border-radius:13px;padding:10px 13px;cursor:pointer;backdrop-filter:blur(12px);
  box-shadow:0 10px 30px rgba(0,0,0,.2);font-weight:750;min-height:44px;
}
.switcher:hover{background:#111827}
footer{text-align:center;color:var(--muted);font-size:13px;margin-top:26px}
@media(max-width:1050px){
  .languages{grid-template-columns:1fr 1fr}
}
@media(max-width:760px){
  #chooser{display:block;padding-top:max(20px,env(safe-area-inset-top))}
  .shell{width:100%}
  .hero{margin-bottom:20px}
  h1{font-size:clamp(34px,11vw,48px);line-height:1.04}
  .hero p{font-size:16px;line-height:1.55}
  .languages{grid-template-columns:1fr;gap:14px}
  .language-card{
    min-height:0;padding:22px;border-radius:21px;
  }
  .language-card:hover{transform:none}
  .flag{font-size:42px;margin-bottom:12px}
  .language-card h2{font-size:25px}
  .language-card p{font-size:14px;margin-bottom:18px}
  .features{gap:6px}
  .chip{padding:6px 9px}
  .open-line{
    position:static;display:block;margin-top:18px;
    padding-top:14px;border-top:1px solid var(--border)
  }
  .switcher{
    top:max(8px,env(safe-area-inset-top));
    right:max(8px,env(safe-area-inset-right));
    padding:9px 11px;font-size:13px;
  }
  footer{padding-bottom:env(safe-area-inset-bottom)}
}
@media(max-width:390px){
  #chooser{padding-left:12px;padding-right:12px}
  .language-card{padding:19px}
  h1{font-size:34px}
  .hero p{font-size:15px}
}
</style>
</head>
<body>
<section id="chooser">
  <div class="shell">
    <div class="hero">
      <span class="kicker">ONE APP · THREE LANGUAGES</span>
      <h1>Choose what you want to learn</h1>
      <p>Study grammar, vocabulary, pronunciation, writing and conversation with explanations, audio, clickable translations and 100 exercises per level.</p>
    </div>

    <div class="languages">
      <button class="language-card polish" onclick="openLanguage('pl')">
        <span class="flag">🇵🇱</span>
        <h2>Polish</h2>
        <p>Learn Polish verbs, special letters, pronunciation clusters and realistic everyday conversations.</p>
        <div class="features">
          <span class="chip">pl-PL audio</span>
          <span class="chip">4 levels</span>
          <span class="chip">Manual answers</span>
        </div>
        <span class="open-line">Start Polish →</span>
      </button>

      <button class="language-card dutch" onclick="openLanguage('nl')">
        <span class="flag">🇳🇱</span>
        <h2>Dutch</h2>
        <p>Learn Dutch grammar, vocabulary, pronunciation, writing and realistic everyday conversations.</p>
        <div class="features">
          <span class="chip">nl-NL audio</span>
          <span class="chip">4 levels</span>
          <span class="chip">Manual answers</span>
        </div>
        <span class="open-line">Start Dutch →</span>
      </button>

      <button class="language-card portuguese" onclick="openLanguage('pt')">
        <span class="flag">🇵🇹</span>
        <h2>Portuguese from Portugal</h2>
        <p>European Portuguese only, including Portugal vocabulary, grammar and pt-PT pronunciation.</p>
        <div class="features">
          <span class="chip">pt-PT audio</span>
          <span class="chip">Portugal vocabulary</span>
          <span class="chip">Manual answers</span>
        </div>
        <span class="open-line">Start Portuguese →</span>
      </button>
    </div>
    <footer>Your progress for each language is saved separately in your browser.</footer>
  </div>
</section>

<section id="player">
  <button class="switcher" onclick="backToLanguages()">⇆ Change language</button>
  <iframe id="appFrame" title="Language learning application"></iframe>
</section>

function decodeBase64Utf8(value) {
  const binary = atob(value);
  const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

t;\n  }\n  .question-head,.phrase-line{\n    align-items:flex-start!important;\n    flex-direction:column!important;\n    gap:8px!important;\n  }\n  .listen,.listen-inline,.speak{\n    min-height:42px!important;\n    width:100%!important;\n    margin-left:0!important;\n  }\n  .option{\n    min-height:46px!important;\n    padding:12px!important;\n  }\n  input[type=text],textarea,.manual-input{\n    font-size:16px!important;\n    min-height:46px!important;\n  }\n  .primary,.secondary{\n    min-height:44px!important;\n    width:100%!important;\n  }\n  .actions{display:grid!important;grid-template-columns:1fr!important}\n  .rule-table,.table-wrap{font-size:14px!important}\n  th,td{padding:9px 8px!important}\n  .score,.score-box{\n    position:sticky!important;\n    bottom:max(8px,env(safe-area-inset-bottom))!important;\n    z-index:20!important;\n  }\n  .dictionary-popover,.popover{\n    left:12px!important;\n    right:12px!important;\n    width:auto!important;\n    max-width:none!important;\n  }\n  footer{padding-bottom:env(safe-area-inset-bottom)!important}\n}\n</style>\n';

function openLanguage(code) {
  const frame = document.getElementById('appFrame');
  let appHtml = decodeBase64Utf8(APPS[code]);
  appHtml = appHtml.replace('</head>', `${MOBILE_INNER_CSS}</head>`);
  frame.srcdoc = appHtml;
  document.getElementById('chooser').style.display = 'none';
  document.getElementById('player').style.display = 'block';
  document.title =
    code === 'nl' ? 'Dutch Learning Studio' :
    code === 'pl' ? 'Polish Learning Studio' :
    'European Portuguese Learning Studio';
  localStorage.setItem('last-language-studio', code);
}

function backToLanguages() {
  const frame = document.getElementById('appFrame');
  frame.srcdoc = '';
  document.getElementById('player').style.display = 'none';
  document.getElementById('chooser').style.display = 'grid';
  document.title = 'Language Learning Studio';
}

function syncViewportHeight(){
  document.documentElement.style.setProperty('--app-vh', window.innerHeight + 'px');
}
window.addEventListener('resize', syncViewportHeight);
window.addEventListener('orientationchange', syncViewportHeight);
syncViewportHeight();

const last = localStorage.getItem('last-language-studio');
